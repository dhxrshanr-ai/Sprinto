<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Collaborative Project Management Tool - Organize your team's work with Kanban boards">
  <title>TaskFlow - Project Management</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="animated-bg"></div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">
        <h1>⚡ TaskFlow</h1>
        <p>Manage projects, collaborate with your team</p>
      </div>

      <!-- Auth Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" id="registerTab" onclick="switchTab('register')">Sign Up</button>
      </div>

      <!-- Login Form -->
      <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" class="form-input" id="loginEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" class="form-input" id="loginPassword" placeholder="Enter your password" required>
        </div>
        <div class="error-message" id="loginError"></div>
        <button type="submit" class="btn btn-primary" id="loginBtn" style="width:100%">
          Sign In
        </button>
      </form>

      <!-- Register Form -->
      <form class="auth-form hidden" id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="registerName">Full Name</label>
          <input type="text" class="form-input" id="registerName" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label for="registerEmail">Email</label>
          <input type="email" class="form-input" id="registerEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="registerPassword">Password</label>
          <input type="password" class="form-input" id="registerPassword" placeholder="Min 6 characters" minlength="6" required>
        </div>
        <div class="error-message" id="registerError"></div>
        <button type="submit" class="btn btn-primary" id="registerBtn" style="width:100%">
          Create Account
        </button>
      </form>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
